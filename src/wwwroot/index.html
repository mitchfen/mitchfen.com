<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>mitchfen.com</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body style="background-color: #282a36;">
    <div id="app">
        <div style="font-family: 'IBM Plex Mono', monospace; color: #f8f8f2; background-color: #282a36; height: 100vh; padding: 1rem; box-sizing: border-box;">
            <div style="max-width: 900px; margin: 0 auto; line-height: 1.5; font-size: 1.1rem;">
                <span style="color: #6272a4; font-style: italic;">welcome [guest] to [mitchfen.com]</span><br>
                <br>
                [ <span style="color: #50fa7b;">OK</span> ] Loading Blazor WebAssembly...<br>
                [ <span style="color: #50fa7b;">OK</span> ] Applying Dracula theme...<br>
                <div style="display: flex; align-items: center; margin-top: 1.5rem;">
                    <span style="color: #ff79c6; font-weight: bold;">guest <span style="color: #bd93f9; font-weight: normal; margin-left: 5px;">$</span></span>
                    <span style="display: inline-block; width: 10px; height: 1.2rem; background-color: #f8f8f2; margin-left: 10px; vertical-align: middle; animation: blink 1s step-end infinite; box-shadow: 0 0 8px #f8f8f2;"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        uh oh! an error has occurred.
        <a href="" class="reload">reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <style>
        @keyframes blink { 
            from, to { opacity: 1; } 
            50% { opacity: 0; } 
        }
        @media (min-width: 768px) {
            #app > div { padding: 2rem !important; }
        }
    </style>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.scrollToBottom = () => {
            const terminal = document.querySelector('.terminal-container');
            if (terminal) {
                terminal.scrollTop = terminal.scrollHeight;
            }
        };
    </script>
</body>

</html>
