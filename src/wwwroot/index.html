<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>mitchfen.com</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body style="background-color: #282a36;">
    <div id="app">
        <div style="font-family: 'IBM Plex Mono', monospace; color: #f8f8f2; background-color: #282a36; height: 100vh; padding: 1rem; box-sizing: border-box;">
            <div style="max-width: 900px; margin: 0 auto; line-height: 1.5; font-size: 1.1rem;">
                [ <span style="color: #50fa7b;">OK</span> ] Loading Blazor WebAssembly...<br>
                [ <span style="color: #50fa7b;">OK</span> ] Applying Dracula theme...<br>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        uh oh! an error has occurred.
        <a href="" class="reload">reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <style>
        @keyframes blink { 
            from, to { opacity: 1; } 
            50% { opacity: 0; } 
        }
        @media (min-width: 768px) {
            #app > div { padding: 2rem !important; }
        }
    </style>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.color = '#ff5555';
            errorDiv.style.position = 'fixed';
            errorDiv.style.bottom = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = '#282a36';
            errorDiv.style.padding = '10px';
            errorDiv.style.fontSize = '12px';
            errorDiv.style.zIndex = '9999';
            errorDiv.style.borderTop = '2px solid #ff5555';
            errorDiv.innerHTML = '<b>Error:</b> ' + msg + '<br><b>Url:</b> ' + url + '<br><b>Line:</b> ' + lineNo;
            document.body.appendChild(errorDiv);
            return false;
        };

        Blazor.start().catch(function (error) {
            console.error(error);
            const errorDiv = document.createElement('div');
            errorDiv.style.color = '#ff5555';
            errorDiv.style.padding = '20px';
            errorDiv.innerHTML = '<h1>Blazor failed to start</h1><pre>' + error.toString() + '</pre>';
            document.getElementById('app').appendChild(errorDiv);
        });

        window.scrollToBottom = () => {
            const terminal = document.querySelector('.terminal-container');
            if (terminal) {
                terminal.scrollTop = terminal.scrollHeight;
            }
        };
    </script>
</body>

</html>
