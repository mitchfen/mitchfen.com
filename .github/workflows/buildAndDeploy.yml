name: Build and Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch: 

# Set minimum permissions at workflow level for dependabot
permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '10.0.x'

      - name: Cache Nuget packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.nuget/packages
          key: nuget-packages-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-packages-

      - name: Build
        run: dotnet run --project ./build/NukeBuild.csproj --target Publish

      - name: Upload output directory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: output
          path: ./output
          retention-days: 1

  publish-container:
    if: ${{ github.event_name == 'push' }}
    name: Publish container image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '10.0.x'

      - name: Download output from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: output
          path: output

      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: dotnet run --project ./build/NukeBuild.csproj --target PushContainerImage --skip Publish

  deploy_job:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Azure
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: 'mitchfen.com'
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Download output from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: output
          path: output

      - name: Build And Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations
          action: "upload"
          skip_app_build: true # The app has already been built by Nuke
          app_location: "output/wwwroot"
